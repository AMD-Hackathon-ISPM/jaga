# ---------------------------------------------------------------------------
# HTTP :80 — serves the ACME (Let's Encrypt) challenge and redirects to HTTPS.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name daffatrg.me www.daffatrg.me;

    # Swarm health probe stays on HTTP so it never depends on the cert.
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Let's Encrypt HTTP-01 challenge (served from the shared certbot webroot).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Everything else goes to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS :443 — the application.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name daffatrg.me www.daffatrg.me;

    ssl_certificate     /etc/letsencrypt/live/daffatrg.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daffatrg.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection '1; mode=block' always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /health {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_pass http://go_api/health;
    }

    location /api/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 64k;
        proxy_pass http://go_api;
    }

    location /internal/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_pass http://go_api;
    }

    location /v1/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_pass http://go_api;
    }

    location = /healthz {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_pass http://go_api/healthz;
    }

    location /storage/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_pass http://minio_api;
    }

    location / {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering on;
        proxy_pass http://web_app;
    }
}
