worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65s;
    keepalive_requests 1000;

    client_max_body_size 100m;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 300s;
    reset_timedout_connection on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format swarm '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log swarm;
    error_log /var/log/nginx/error.log warn;

    upstream go_api {
        server go-api:8080;
        keepalive 32;
    }

    upstream web_app {
        server web:3000;
        keepalive 32;
    }

    upstream minio_api {
        server minio:9000;
        keepalive 16;
    }

    include /etc/nginx/conf.d/*.conf;
}
