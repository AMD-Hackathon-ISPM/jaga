x-common-deploy: &common-deploy
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 30s
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
    monitor: 30s
  rollback_config:
    parallelism: 1
    delay: 5s
    order: stop-first
  placement:
    constraints:
      - node.platform.os == linux

services:
  nginx:
    image: ${NGINX_IMAGE}
    ports:
      - target: 80
        published: ${NGINX_PUBLISHED_PORT:-80}
        protocol: tcp
        mode: ingress
    networks:
      - jaga-network
    configs:
      - source: nginx_main_conf
        target: /etc/nginx/nginx.conf
      - source: nginx_default_conf
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - logs:/var/log/nginx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://127.0.0.1/nginx-health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.25'
          memory: 128M
        limits:
          cpus: '1.00'
          memory: 512M

  web:
    image: ${WEB_IMAGE}
    networks:
      - jaga-network
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.25'
          memory: 256M
        limits:
          cpus: '2.00'
          memory: 1G

  go-api:
    image: ${GO_API_IMAGE}
    networks:
      - jaga-network
    environment:
      JAGA_BACKEND_ADDR: :8080
      JAGA_PYTHON_PROJECT_ROOT: ${MODEL_PATH}
      JAGA_BACKEND_POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JAGA_BACKEND_REDIS_ADDR: redis:6379
      JAGA_BACKEND_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAGA_BACKEND_MINIO_ENDPOINT: minio:9000
      JAGA_BACKEND_MINIO_USE_SSL: 'false'
      JAGA_BACKEND_MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      JAGA_BACKEND_MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      JAGA_BACKEND_FEATHERLESS_URL: ${FEATHERLESS_URL}
      JAGA_BACKEND_FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY}
      JAGA_BACKEND_FEATHERLESS_MODEL: ${FEATHERLESS_MODEL}
      JAGA_BACKEND_JWT_SECRET: ${JWT_SECRET}
      JAGA_BACKEND_UPLOAD_PATH: ${UPLOAD_PATH}
      JAGA_BACKEND_MODEL_PATH: ${MODEL_PATH}
      # Gemma drives the triage orchestrator and the chat assistant. Switch the
      # provider with LLM_PROVIDER (fireworks | featherless).
      LLM_PROVIDER: ${LLM_PROVIDER:-fireworks}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY}
      FIREWORKS_CHAT_URL: ${FIREWORKS_CHAT_URL}
      FIREWORKS_CHAT_MODEL: ${FIREWORKS_CHAT_MODEL}
      FEATHERLESS_URL: ${FEATHERLESS_URL}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY}
      FEATHERLESS_CHAT_MODEL: ${FEATHERLESS_CHAT_MODEL}
      # Downstream model services the orchestrator calls.
      YAMNET_URL: http://yamnet:8081
      XGB_URL: http://xgboost:8082
      PRISMA_URL: http://prisma-worker:${PRISMA_WORKER_PORT}
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      <<: *common-deploy
      replicas: 2
      placement:
        constraints:
          - node.platform.os == linux
        preferences:
          - spread: node.id
      resources:
        reservations:
          cpus: '0.50'
          memory: 256M
        limits:
          cpus: '2.00'
          memory: 1G

  prisma-worker:
    image: ${PRISMA_WORKER_IMAGE}
    networks:
      - jaga-network
    environment:
      PRISMA_WORKER_PORT: ${PRISMA_WORKER_PORT}
      WORKER_CONCURRENCY: '1'
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: 'false'
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      FEATHERLESS_URL: ${FEATHERLESS_URL}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL}
      UPLOAD_PATH: ${UPLOAD_PATH}
      MODEL_PATH: ${MODEL_PATH}
      PRISMA_ARTIFACT_ROOT: /app/app/models
      PRISMA_THRESHOLD: ${PRISMA_THRESHOLD:-0.5}
      PRISMA_GRADCAM: ${PRISMA_GRADCAM:-true}
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
    volumes:
      - model_cache:/models
      - logs:/var/log/prisma
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:${PRISMA_WORKER_PORT}/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.50'
          memory: 2G
        limits:
          cpus: '4.00'
          memory: 12G

  yamnet:
    # Rust cough-detection service (YAMNet via ONNX Runtime).
    image: ${YAMNET_IMAGE}
    networks:
      - jaga-network
    environment:
      YAMNET_ADDR: 0.0.0.0:8081
      YAMNET_MODEL_PATH: /app/models/yamnet/yamnet.onnx
      YAMNET_CLASS_MAP_PATH: /app/models/yamnet/yamnet_class_map.csv
      COUGH_THRESHOLD: ${COUGH_THRESHOLD:-0.5}
      ORT_DYLIB_PATH: ${ORT_DYLIB_PATH:-/usr/local/lib/libonnxruntime.so}
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:8081/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.50'
          memory: 512M
        limits:
          cpus: '2.00'
          memory: 2G

  xgboost:
    # Rust TB-probability service (XGBoost ONNX + WavLM embedding via Fireworks).
    image: ${XGBOOST_IMAGE}
    networks:
      - jaga-network
    environment:
      XGB_ADDR: 0.0.0.0:8082
      XGB_MODEL_PATH: /app/models/xgboostAndDemoPreprocessor/tb_xgb_demo.onnx
      # Local WavLM int8 is the primary embedder; Fireworks is the online fallback
      # if it errors or runs past LOCAL_EMBED_TIMEOUT_SECS.
      WAVLM_MODEL_PATH: /app/models/wavlm/wavlm_large_int8.onnx
      LOCAL_EMBED_TIMEOUT_SECS: ${LOCAL_EMBED_TIMEOUT_SECS:-15}
      GO_BACKEND_URL: http://go-api:8080
      DEFAULT_COUNTRY: ${DEFAULT_COUNTRY:-PH}
      FIREWORKS_EMBEDDING_URL: ${FIREWORKS_EMBEDDING_URL}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY}
      FIREWORKS_MODEL: ${FIREWORKS_EMBEDDING_MODEL}
      ORT_DYLIB_PATH: ${ORT_DYLIB_PATH:-/usr/local/lib/libonnxruntime.so}
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:8082/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.50'
          memory: 1G
        limits:
          cpus: '2.00'
          memory: 3G

  redis:
    image: ${REDIS_IMAGE}
    command:
      - sh
      - -c
      - redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"
    networks:
      - jaga-network
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.25'
          memory: 128M
        limits:
          cpus: '1.00'
          memory: 512M

  postgres:
    image: ${POSTGRES_IMAGE}
    networks:
      - jaga-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init_sql
        target: /docker-entrypoint-initdb.d/001-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -h 127.0.0.1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.50'
          memory: 256M
        limits:
          cpus: '2.00'
          memory: 2G

  minio:
    image: ${MINIO_IMAGE}
    command:
      - server
      - /data
      - --console-address
      - :9001
    networks:
      - jaga-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_UPLOADS: ${MINIO_BUCKET_UPLOADS}
      MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS}
    volumes:
      - minio_data:/data
    deploy:
      <<: *common-deploy
      replicas: 1
      resources:
        reservations:
          cpus: '0.25'
          memory: 256M
        limits:
          cpus: '2.00'
          memory: 2G

networks:
  jaga-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
  logs:

configs:
  # Swarm configs are immutable: an in-place content change is rejected. The
  # deploy scripts export a content hash per file so a changed file yields a NEW
  # config name — `docker stack deploy` creates the new one and repoints the
  # service. Swarm does NOT auto-remove the old config, so the deploy scripts
  # prune orphaned jaga_* configs after deploying. No stack rm needed. Falls
  # back to v1 when deployed without the scripts (first run / unchanged content).
  nginx_main_conf:
    name: jaga_nginx_main_${NGINX_MAIN_HASH:-v1}
    file: ./nginx/nginx.conf
  nginx_default_conf:
    name: jaga_nginx_default_${NGINX_DEFAULT_HASH:-v1}
    file: ./nginx/conf.d/default.conf
  postgres_init_sql:
    name: jaga_postgres_init_${POSTGRES_INIT_HASH:-v1}
    file: ./postgres/init/001-base.sql
